<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Time</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <h1>Line Time: Internet</h1>

    <div id="timeline">

        <div class="content">
            <div class="info">
                <h4>1969: El nacimiento de ARPANET</h4>
                <p>Se crea ARPANET, la red que dará origen a Internet.</p>
            </div>
        </div>
        <div class="content">
            <div class="info">
                <h4>1971: Primer correo electrónico</h4>
                <p>Se envía el primer correo electrónico.</p>
            </div>
        </div>
        <div class="content">
            <div class="info">
                <h4>1982: Se crea el protocolo TCP/IP</h4>
                <p>Se establece el protocolo TCP/IP como estándar para la comunicación en Internet.</p>
            </div>
        </div>

    </div>

    <script src="../js/main.js"></script>
</body>
</html>
